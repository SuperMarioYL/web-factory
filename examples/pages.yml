# Copy this to your repo as .github/workflows/pages.yml
# Prereqs: enable GitHub Pages → Source: "GitHub Actions",
# and add web/site.json (+ optional web/assets/) to your repo.
name: Deploy site

on:
  push:
    branches: [main]
    paths: ['web/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  site:
    uses: SuperMarioYL/web-factory/.github/workflows/build-site.yml@v1
